<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Detail evenement')}">
    <title>Detail evenement · Samen Anderlecht vzw</title>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow w-full max-w-2xl mx-auto px-4 py-10">
    <a th:href="@{/}" class="text-sm text-emerald-700 hover:underline">&larr; Terug naar overzicht</a>

    <article class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 mt-4">
        <h1 class="text-2xl font-bold text-gray-900" th:text="${event.titel}">Titel</h1>
        <p class="text-gray-500 mt-1"
           th:text="${#temporals.format(event.tijdstip, 'dd-MM-yyyy HH:mm')}">Tijdstip</p>

        <dl class="mt-6 divide-y divide-gray-100">
            <div class="py-3 grid grid-cols-3 gap-4">
                <dt class="text-sm font-medium text-gray-500">Organisatie</dt>
                <dd class="col-span-2 text-gray-900" th:text="${event.organisatie}">Organisatie</dd>
            </div>
            <div class="py-3 grid grid-cols-3 gap-4">
                <dt class="text-sm font-medium text-gray-500">Contactpersoon</dt>
                <dd class="col-span-2">
                    <a th:href="'mailto:' + ${event.contactEmail}" th:text="${event.contactEmail}"
                       class="text-emerald-700 hover:underline">e-mail</a>
                </dd>
            </div>
            <div class="py-3 grid grid-cols-3 gap-4">
                <dt class="text-sm font-medium text-gray-500">Locatie</dt>
                <dd class="col-span-2 text-gray-900">
                    <span class="font-medium" th:text="${event.location.naam}">Naam</span><br/>
                    <span class="text-gray-600" th:text="${event.location.adres}">Adres</span><br/>
                    <span class="text-gray-500 text-sm"
                          th:text="'Capaciteit: ' + ${event.location.capaciteit} + ' personen'">Capaciteit</span>
                </dd>
            </div>
            <div class="py-3 grid grid-cols-3 gap-4">
                <dt class="text-sm font-medium text-gray-500">Omschrijving</dt>
                <dd class="col-span-2 text-gray-900 whitespace-pre-line" th:text="${event.omschrijving}">Omschrijving</dd>
            </div>
        </dl>
    </article>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
