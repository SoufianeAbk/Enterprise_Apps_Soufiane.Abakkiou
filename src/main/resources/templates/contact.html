<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Contact')}">
    <title>Contact · Samen Anderlecht vzw</title>
</head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow w-full max-w-2xl mx-auto px-4 py-10">
    <header class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Contact</h1>
        <p class="text-gray-500 mt-1">Stuur een bericht naar de administrators van Samen Anderlecht vzw.</p>
    </header>

    <div th:if="${success}"
         class="mb-5 rounded-lg bg-emerald-50 border border-emerald-200 text-emerald-800 px-4 py-3 text-sm"
         th:text="${success}">Verzonden!</div>

    <div th:if="${error}"
         class="mb-5 rounded-lg bg-red-50 border border-red-200 text-red-800 px-4 py-3 text-sm"
         th:text="${error}">Fout</div>

    <form th:action="@{/contact}" th:object="${contactForm}" method="post"
          class="bg-white border border-gray-200 rounded-xl shadow-sm p-6 space-y-5">

        <div>
            <label for="naam" class="block text-sm font-medium text-gray-700 mb-1">Naam</label>
            <input type="text" id="naam" th:field="*{naam}"
                   class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:border-emerald-500 focus:ring-emerald-500 focus:outline-none"/>
            <p th:if="${#fields.hasErrors('naam')}" th:errors="*{naam}" class="text-red-600 text-sm mt-1"></p>
        </div>

        <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">E-mailadres</label>
            <input type="email" id="email" th:field="*{email}"
                   class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:border-emerald-500 focus:ring-emerald-500 focus:outline-none"/>
            <p th:if="${#fields.hasErrors('email')}" th:errors="*{email}" class="text-red-600 text-sm mt-1"></p>
        </div>

        <div>
            <label for="bericht" class="block text-sm font-medium text-gray-700 mb-1">Bericht</label>
            <textarea id="bericht" th:field="*{bericht}" rows="5"
                      class="w-full rounded-lg border border-gray-300 px-3 py-2 focus:border-emerald-500 focus:ring-emerald-500 focus:outline-none"></textarea>
            <p th:if="${#fields.hasErrors('bericht')}" th:errors="*{bericht}" class="text-red-600 text-sm mt-1"></p>
        </div>

        <button type="submit"
                class="bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-5 py-2.5 rounded-lg shadow-sm transition-colors">
            Bericht versturen
        </button>
    </form>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
