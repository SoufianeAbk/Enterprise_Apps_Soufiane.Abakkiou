<!DOCTYPE html>
<html lang="nl" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/layout :: head('Evenementen')}"></head>
<body class="bg-gray-50 text-gray-800 min-h-screen flex flex-col">

<nav th:replace="~{fragments/layout :: navbar}"></nav>

<main class="flex-grow w-full max-w-5xl mx-auto px-4 py-10">
    <header class="mb-6">
        <h1 class="text-2xl font-bold text-gray-900">Evenementen</h1>
        <p class="text-gray-500 mt-1">De tien laatste evenementen van Samen Anderlecht en haar partners.</p>
    </header>

    <div class="bg-white border border-gray-200 rounded-xl shadow-sm overflow-hidden">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-50">
            <tr>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Titel</th>
                <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase tracking-wider">Organisatie</th>
                <th class="px-6 py-3 text-right text-xs font-semibold text-gray-500 uppercase tracking-wider">Detail</th>
            </tr>
            </thead>
            <tbody class="divide-y divide-gray-100">
            <tr th:each="event : ${events}" class="hover:bg-gray-50 transition-colors">
                <td class="px-6 py-4 font-medium text-gray-900" th:text="${event.titel}">Titel</td>
                <td class="px-6 py-4 text-gray-600" th:text="${event.organisatie}">Organisatie</td>
                <td class="px-6 py-4 text-right">
                    <a th:href="@{/events/{id}(id=${event.id})}"
                       class="text-emerald-700 hover:text-emerald-900 font-medium hover:underline">
                        Details &rarr;
                    </a>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(events)}">
                <td colspan="3" class="px-6 py-10 text-center text-gray-400">
                    Er zijn nog geen evenementen.
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <div class="mt-6">
        <a th:href="@{/new}"
           class="inline-flex items-center gap-2 bg-emerald-600 hover:bg-emerald-700 text-white font-medium px-5 py-2.5 rounded-lg shadow-sm transition-colors">
            <span class="text-lg leading-none">+</span> Nieuw evenement toevoegen
        </a>
    </div>
</main>

<footer th:replace="~{fragments/layout :: footer}"></footer>
</body>
</html>
