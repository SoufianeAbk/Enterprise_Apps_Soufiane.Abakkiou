spring.application.name=Enterprise_Apps_Soufiane.Abakkiou

# --- H2 in-memory database ---
spring.datasource.url=jdbc:h2:mem:ngodb;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=true

# H2-console bereikbaar via http://localhost:8080/h2-console (JDBC URL: jdbc:h2:mem:ngodb)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# --- Thymeleaf ---
spring.thymeleaf.cache=false

# --- Mail (mailtrap.io) ---
# Vul je eigen mailtrap-gegevens in via omgevingsvariabelen MAILTRAP_USER en MAILTRAP_PASS,
# of pas de standaardwaarden hieronder aan.
spring.mail.host=${MAILTRAP_HOST:sandbox.smtp.mailtrap.io}
spring.mail.port=${MAILTRAP_PORT:2525}
spring.mail.username=${MAILTRAP_USER:}
spring.mail.password=${MAILTRAP_PASS:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Afzender en bestemmeling van contactberichten
app.mail.to=${CONTACT_TO:info@samenanderlecht.be}
app.mail.from=${CONTACT_FROM:no-reply@samenanderlecht.be}
